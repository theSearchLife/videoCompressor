name: Build native binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: linux-amd64,   goos: linux,   goarch: amd64, ext: "",     archive: tar.gz }
          - { name: linux-arm64,   goos: linux,   goarch: arm64, ext: "",     archive: tar.gz }
          - { name: darwin-amd64,  goos: darwin,  goarch: amd64, ext: "",     archive: tar.gz }
          - { name: darwin-arm64,  goos: darwin,  goarch: arm64, ext: "",     archive: tar.gz }
          - { name: windows-amd64, goos: windows, goarch: amd64, ext: ".exe", archive: zip    }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build vc binary
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
          TARGET_NAME: ${{ matrix.target.name }}
          TARGET_EXT: ${{ matrix.target.ext }}
        run: |
          set -euo pipefail
          STAGE="dist/vc-${TARGET_NAME}"
          mkdir -p "$STAGE"
          go build -trimpath -ldflags="-s -w" \
            -o "$STAGE/vc${TARGET_EXT}" ./cmd/vc
          cp README.md "$STAGE/README.md"

      - name: Bundle ffmpeg + ffprobe (Windows only)
        if: matrix.target.goos == 'windows'
        env:
          # Pinned Gyan stable release. GPL build with x264, x265, opus etc.
          FFMPEG_URL: "https://github.com/GyanD/codexffmpeg/releases/download/7.1.1/ffmpeg-7.1.1-essentials_build.zip"
          TARGET_NAME: ${{ matrix.target.name }}
        run: |
          set -euo pipefail
          STAGE="dist/vc-${TARGET_NAME}"
          curl -fSL "$FFMPEG_URL" -o ffmpeg.zip
          unzip -q ffmpeg.zip -d ffmpeg-extracted
          cp ffmpeg-extracted/*/bin/ffmpeg.exe  "$STAGE/"
          cp ffmpeg-extracted/*/bin/ffprobe.exe "$STAGE/"
          if compgen -G "ffmpeg-extracted/*/LICENSE" > /dev/null; then
            cp ffmpeg-extracted/*/LICENSE "$STAGE/FFMPEG-LICENSE.txt"
          fi
          if [ -f docs/WINDOWS-README.txt ]; then
            cp docs/WINDOWS-README.txt "$STAGE/WINDOWS-README.txt"
          fi

      - name: Package archive
        env:
          TARGET_NAME: ${{ matrix.target.name }}
          ARCHIVE: ${{ matrix.target.archive }}
        run: |
          set -euo pipefail
          cd dist
          STAGE="vc-${TARGET_NAME}"
          if [ "$ARCHIVE" = "zip" ]; then
            zip -qr "${STAGE}.zip" "$STAGE"
          else
            tar czf "${STAGE}.tar.gz" "$STAGE"
          fi
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: vc-${{ matrix.target.name }}
          path: dist/vc-${{ matrix.target.name }}.${{ matrix.target.archive }}
          if-no-files-found: error

  release:
    name: Attach binaries to GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/vc-*
          generate_release_notes: true
          fail_on_unmatched_files: true
