name: Task
description: A discrete implementation task
title: "[Task]: "
labels: ["task"]
body:
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What does this task accomplish? 2-3 sentences.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Files to create/modify.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: What must be complete before this task?
    validations:
      required: false

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      options:
        - Small (< 2 hours)
        - Medium (2-4 hours)
        - Large (4-8 hours)
    validations:
      required: true
